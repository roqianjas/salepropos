<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3afa;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="1000" fill="url(#brandGradient)"/>

  <g stroke="white" stroke-width="1" stroke-opacity="0.1" fill="none">
    <path d="M-50,200 L250,200 L400,350 L400,600 L600,800 L1050,800" />
    <path d="M200,-50 L200,200 L450,450 L750,450 L900,600 L900,1050" />
    <path d="M1050,300 L700,300 L500,500 L500,1050" />
  </g>

  <circle r="4" fill="white" fill-opacity="0.8" filter="url(#glow)">
    <animateMotion dur="8s" repeatCount="indefinite" path="M-50,200 L250,200 L400,350 L400,600 L600,800 L1050,800" />
  </circle>

  <g fill="white" fill-opacity="0.05">
    <rect x="100" y="100" width="60" height="60" rx="8">
        <animate attributeName="y" values="100;120;100" dur="5s" repeatCount="indefinite" />
    </rect>
    <rect x="800" y="200" width="100" height="100" rx="12">
        <animate attributeName="y" values="200;170;200" dur="7s" repeatCount="indefinite" />
    </rect>
    <rect x="450" y="700" width="40" height="40" rx="4">
        <animate attributeName="opacity" values="0.05;0.15;0.05" dur="4s" repeatCount="indefinite" />
    </rect>
  </g>

  <circle cx="400" cy="350" r="3" fill="white" fill-opacity="0.4">
    <animate attributeName="r" values="3;6;3" dur="3s" repeatCount="indefinite" />
    <animate attributeName="fill-opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="700" cy="300" r="3" fill="white" fill-opacity="0.4">
    <animate attributeName="r" values="3;6;3" dur="4s" repeatCount="indefinite" />
    <animate attributeName="fill-opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>
